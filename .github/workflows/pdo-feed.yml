name: PDO Feed

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scrape.py
      - name: Publish feed
        run: |
          git config user.name "pdo-bot"
          git config user.email "actions@github.com"
          git add feed.xml index.html seen.json
          git commit -m "Update PDO feed" || echo "no changes"
          git push
